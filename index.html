<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#534AB7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>词记 - 免费背单词</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- 顶部导航 -->
    <nav class="navbar">
      <div class="nav-brand">词记</div>
      <div class="nav-actions">
        <span class="nav-icon" onclick="App.showPage('stats')">&#128202;</span>
        <span class="nav-icon" onclick="App.showPage('settings')">&#9881;</span>
      </div>
    </nav>

    <!-- 页面：学习 -->
    <div id="page-learn" class="page active">
      <!-- 今日进度 -->
      <div class="progress-card">
        <div class="progress-header">
          <span>今日进度</span>
          <span id="progress-text" class="progress-value">0/0</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="progress-detail">
          <span>新词 <strong id="new-count">0</strong></span>
          <span>复习 <strong id="review-count">0</strong></span>
        </div>
      </div>

      <!-- 单词卡片 -->
      <div id="word-card" class="word-card">
        <div class="card-tag" id="card-tag">n. 名词</div>
        <div class="card-word-wrap">
          <div class="card-word" id="card-word">abandon</div>
          <button class="card-speaker" id="btn-speak" onclick="App.speak()" title="点击发音">&#128266;</button>
        </div>
        <div class="card-phonetic" id="card-phonetic">/&#601;'b&#230;nd&#601;n/</div>
        <button class="card-def-toggle" id="def-toggle" onclick="App.toggleDefinition()">点击查看释义</button>
        <div class="card-definition" id="card-definition" style="display:none;">
          <div id="def-meaning"></div>
        </div>
        <div class="card-example" id="card-example" style="display:none;">
          <div class="example-en" id="example-en"></div>
          <div class="example-cn" id="example-cn"></div>
        </div>
        <div class="card-medical-tag" id="medical-tag" style="display:none;">&#128137; 医学词汇</div>
      </div>

      <!-- 操作按钮 -->
      <div class="action-buttons">
        <button class="btn btn-forget" onclick="App.rateWord(0)">不认识</button>
        <button class="btn btn-hesitate" onclick="App.rateWord(3)">模糊</button>
        <button class="btn btn-know" onclick="App.rateWord(5)">认识</button>
      </div>

      <!-- 快捷键提示 -->
      <div class="shortcut-hint">键盘: &#8592; 不认识 &nbsp; &#8593; 模糊 &nbsp; &#8594; 认识</div>

      <!-- 学习完成提示 -->
      <div id="complete-banner" class="complete-banner" style="display:none;">
        <div class="complete-icon">&#127881;</div>
        <div class="complete-title">今日学习完成！</div>
        <div id="complete-stats" class="complete-stats"></div>
        <button class="btn btn-know" style="margin-top:12px;" onclick="App.startLearning()">再学一些</button>
      </div>
    </div>

    <!-- 页面：统计 -->
    <div id="page-stats" class="page">
      <h2 class="section-title">学习统计</h2>
      
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="stat-total-words">0</div>
          <div class="stat-label">已学词汇</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-total-reviews">0</div>
          <div class="stat-label">累计复习</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">连续天数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-accuracy">0%</div>
          <div class="stat-label">认识率</div>
        </div>
      </div>

      <h2 class="section-title" style="margin-top:24px;">本周学习</h2>
      <div id="week-chart" class="week-chart"></div>

      <button class="btn btn-back" onclick="App.showPage('learn')">返回学习</button>
    </div>

    <!-- 页面：词库选择 -->
    <div id="page-vocab" class="page">
      <h2 class="section-title">选择词库</h2>
      
      <div class="vocab-list">
        <label class="vocab-option">
          <input type="radio" name="vocab" value="all" checked onchange="App.changeVocab('all')">
          <div class="vocab-info">
            <div class="vocab-name">全部词汇</div>
            <div class="vocab-desc">考研核心 + 医学英语</div>
          </div>
          <div class="vocab-count" id="vocab-count-all">0词</div>
        </label>
        
        <label class="vocab-option">
          <input type="radio" name="vocab" value="cetkaoyan" onchange="App.changeVocab('cetkaoyan')">
          <div class="vocab-info">
            <div class="vocab-name">考研核心词汇</div>
            <div class="vocab-desc">考研英语高频词</div>
          </div>
          <div class="vocab-count" id="vocab-count-cetkaoyan">0词</div>
        </label>
        
        <label class="vocab-option">
          <input type="radio" name="vocab" value="medical" onchange="App.changeVocab('medical')">
          <div class="vocab-info">
            <div class="vocab-name">&#128137; 医学英语词汇</div>
            <div class="vocab-desc">PACS/DICOM/医学影像术语</div>
          </div>
          <div class="vocab-count" id="vocab-count-medical">0词</div>
        </label>
      </div>

      <button class="btn btn-back" onclick="App.showPage('learn')">返回学习</button>
    </div>

    <!-- 页面：设置 -->
    <div id="page-settings" class="page">
      <h2 class="section-title">设置</h2>

      <div class="setting-group">
        <label class="setting-row">
          <span>每日新词数量</span>
          <input type="number" id="setting-daily-new" min="1" max="9999" value="20" onchange="App.saveSettings()" style="width:80px;padding:6px 10px;border:0.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text-primary);text-align:center;">
        </label>
        <div style="padding:0 18px 12px;font-size:11px;color:var(--text-hint);">输入 999 即为无限制</div>

        <label class="setting-row">
          <span>自动播放发音</span>
          <input type="checkbox" id="setting-auto-play" onchange="App.saveSettings()" checked>
        </label>

        <label class="setting-row">
          <span>显示例句</span>
          <input type="checkbox" id="setting-show-example" onchange="App.saveSettings()" checked>
        </label>
      </div>

      <div class="setting-group" style="margin-top:20px;">
        <div class="setting-row">
          <span>数据管理</span>
        </div>
        <button class="btn btn-danger btn-small" onclick="App.exportData()">导出数据</button>
        <button class="btn btn-danger btn-small" style="margin-left:8px;" onclick="App.clearAllData()">重置全部</button>
      </div>

      <div class="app-info">
        <p>词记 WordNote v0.1</p>
        <p>完全免费 · 无广告 · 无限制</p>
        <p style="color:#aaa;font-size:11px;margin-top:8px;">
          SM-2间隔重复算法 | 考研+医学双词库
        </p>
      </div>

      <button class="btn btn-back" onclick="App.showPage('learn')">返回学习</button>
    </div>

    <!-- 底部Tab栏 -->
    <div class="tabbar">
      <div class="tab-item active" onclick="App.showPage('learn')" data-page="learn">
        <div class="tab-icon">&#128214;</div>
        <div class="tab-label">学习</div>
      </div>
      <div class="tab-item" onclick="App.showPage('vocab')" data-page="vocab">
        <div class="tab-icon">&#128218;</div>
        <div class="tab-label">词库</div>
      </div>
      <div class="tab-item" onclick="App.showPage('stats')" data-page="stats">
        <div class="tab-icon">&#128202;</div>
        <div class="tab-label">统计</div>
      </div>
      <div class="tab-item" onclick="App.showPage('settings')" data-page="settings">
        <div class="tab-icon">&#9881;</div>
        <div class="tab-label">设置</div>
      </div>
    </div>
  </div>

  <script src="data/vocabulary.js"></script>
  <script src="js/sm2.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 注册 Service Worker（PWA离线支持）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('PWA ready!', reg.scope);
        }).catch(err => {
          console.log('PWA offline:', err);
        });
      });
    }
  </script>
</body>
</html>
